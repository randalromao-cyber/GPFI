.mapa{background:#fff;color:#000;font-family:Arial,sans-serif;font-size:12px}
.mapa table{font-size:11px;width:100%;border-collapse:collapse}
.mapa th,.mapa td{border:1px solid #aaa;padding:4px 7px}

.load-screen{min-height:100vh;background:#0d1b2a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.login-screen{min-height:100vh;background:linear-gradient(135deg,#0d1b2a,#162e45);display:flex;align-items:center;justify-content:center;padding:16px}
.hier-tree{padding:8px 0}
.hier-node{padding:4px 0 4px 20px;border-left:2px solid #1e3148;margin-left:8px}
@media print{
  .no-print{display:none!important}
  body{background:#fff;color:#000}

}
@media(max-width:640px){
  .sbar{display:none}.bnav{display:block}
  .main{padding:12px 10px;padding-bottom:80px}

<div id="root"></div>
<script>
const {createElement:h,useState,useEffect,useCallback,Fragment} = React;

// ── SUPABASE ──────────────────────────────────────────────────────────────────
const SB_URL="https://laelsnqvajpbhmaeshoa.supabase.co/rest/v1";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhZWxzbnF2YWpwYmhtYWVzaG9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDI0OTQsImV4cCI6MjA5MjM3ODQ5NH0.voyevlz2pywjM9pZFpj_AgwJhrsGSNTg4092GfBHn4o";
const HDR={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Accept":"application/json"};

async function sb(method,table,params,body){
  const url=SB_URL+"/"+table+(params?"?"+params:"");
  const hh={...HDR};
  if(method==="POST"||method==="PATCH")hh["Prefer"]="return=representation";
  if(method==="POST"&&params&&params.includes("on_conflict"))hh["Prefer"]="resolution=merge-duplicates,return=representation";
  const r=await fetch(url,{method,headers:hh,...(body?{body:JSON.stringify(body)}:{})});
  if(!r.ok){const t=await r.text();throw new Error(r.status+": "+t);}
  if(method==="DELETE")return[];
  const txt=await r.text();
  return txt?JSON.parse(txt):[];
}

// ── CONSTANTES ────────────────────────────────────────────────────────────────
const VB=7512.03,VPCT=0.000333,MINP=1000,MAXP=3000,MAXE=1000;
const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const UNID_COR={GFI:"#1d4ed8",GFM:"#7c3aed",GCF:"#059669",GATIF:"#d97706",DT:"#dc2626",ADMIN:"#64748b"};
const ROLE_LBL={admin:"Admin",diretor:"Diretor",gerente:"Gerente",encarregado:"Encarregado",colaborador:"Auditor"};
const ROLE_ORD={admin:0,diretor:1,gerente:2,encarregado:3,colaborador:4};
const SCOR={pend:"#f59e0b",ap_enc:"#3b82f6",ap_ger:"#10b981",rej:"#ef4444"};
const SLBL={pend:"Aguard. Encarregado",ap_enc:"Aguard. Gerente",ap_ger:"Aprovado ✓",rej:"Rejeitado"};
const UNIDS=["GFI","GFM","GCF","GATIF","DT","ADMIN"];

// Itens com campo de quantidade extra (além do qtd normal)
const COM_QTD=["c31","c41","c42","c44","c45","c49","c50"];

const CAT=[
  {id:"c01",item:"1",   pts:300,desc:"Informações tributárias – mandado de segurança / ações judiciais"},
  {id:"c02",item:"2.1", pts:120,desc:"Serviço fiscal básico – 1 exercício"},
  {id:"c03",item:"2.2", pts:140,desc:"Serviço fiscal básico – 2 exercícios"},
  {id:"c04",item:"2.3", pts:170,desc:"Serviço fiscal básico – 3 exercícios"},
  {id:"c05",item:"2.4", pts:200,desc:"Serviço fiscal básico – 4+ exercícios"},
  {id:"c06",item:"3.1", pts:10, desc:"Verificação – livros contábeis (por exercício)"},
  {id:"c07",item:"3.2", pts:20, desc:"Verificação – relatórios em geral"},
  {id:"c08",item:"3.3", pts:2,  desc:"Verificação – memorandos"},
  {id:"c09",item:"3.4", pts:5,  desc:"Verificação – contratos"},
  {id:"c10",item:"4.1", pts:130,desc:"Arbitramento – não atendimento / notificação"},
  {id:"c11",item:"4.2", pts:145,desc:"Arbitramento – documentos sem condição de conclusão"},
  {id:"c12",item:"4.3", pts:150,desc:"Cálculo por estimativa"},
  {id:"c13",item:"5",   pts:20, desc:"Diligências por contribuinte"},
  {id:"c14",item:"6.1", pts:10, desc:"Autorização – inscrição/alteração/cancelamento"},
  {id:"c15",item:"6.2", pts:10, desc:"Autorização – enquadramento de atividade"},
  {id:"c16",item:"7.1", pts:20, desc:"Notificação / intimação"},
  {id:"c17",item:"7.2", pts:20, desc:"Termo de apreensão"},
  {id:"c18",item:"7.3", pts:20, desc:"Auto de infração"},
  {id:"c19",item:"8.1", pts:200,desc:"Manifestação definitiva – pesquisa doutrina/jurisprudência"},
  {id:"c20",item:"8.2", pts:100,desc:"Manifestação definitiva – fundamentação legal"},
  {id:"c21",item:"9.1", pts:250,desc:"Informações fundamentadas – consulta jurídico-tributária"},
  {id:"c22",item:"9.2", pts:100,desc:"Informações fundamentadas – imunidade/isenção"},
  {id:"c23",item:"9.3", pts:60, desc:"Informações fundamentadas – Regime Especial"},
  {id:"c24",item:"9.4", pts:20, desc:"Pontuação adicional – defesa/recurso"},
  {id:"c25",item:"10.1",pts:150,desc:"Fiscalização especial – diurna (jornada integral)"},
  {id:"c26",item:"10.2",pts:75, desc:"Fiscalização especial – período parcial"},
  {id:"c27",item:"10.3",pts:195,desc:"Fiscalização especial – noturna"},
  {id:"c28",item:"10.4",pts:300,desc:"Fiscalização – feriados ou finais de semana"},
  {id:"c29",item:"11.1",pts:150,desc:"Conferência DIPAM – jornada integral"},
  {id:"c30",item:"11.2",pts:75, desc:"Conferência DIPAM – período parcial"},
  {id:"c31",item:"12.1",pts:20, desc:"Emissão/cancelamento – Demonstrativo de Recolhimento"},
  {id:"c32",item:"13.1",pts:50, desc:"Verificação subempreitada – construção civil"},
  {id:"c33",item:"13.2",pts:15, desc:"Levantamento fiscal – mão-de-obra própria"},
  {id:"c34",item:"14",  pts:75, desc:"Comissões / grupos de trabalho – sem prejuízo"},
  {id:"c35",item:"15",  pts:150,desc:"Comissões / grupos de trabalho – com prejuízo"},
  {id:"c36",item:"16.1",pts:150,desc:"Plantão fiscal – jornada integral"},
  {id:"c37",item:"16.2",pts:75, desc:"Plantão fiscal – período parcial"},
  {id:"c38",item:"17",  pts:300,desc:"Elaboração de parecer técnico-científico"},
  {id:"c39",item:"18",  pts:50, desc:"Monitoramento tomadores/prestadores"},
  {id:"c40",item:"19",  pts:20, desc:"Inclusão/alteração/exclusão cadastral"},
  {id:"c41",item:"20.1",pts:20, desc:"Vistoria – dados proprietário (por UA)"},
  {id:"c42",item:"20.2",pts:30, desc:"Vistoria – Tipo/Padrão Construtivo (por UA)"},
  {id:"c43",item:"20.3",pts:15, desc:"Vistoria – Área Construída (por m²)",esp:"m2"},
  {id:"c44",item:"21.1",pts:20, desc:"Vistoria p/ processo – dados proprietário (por UA)"},
  {id:"c45",item:"21.2",pts:30, desc:"Vistoria p/ processo – Tipo/Padrão (por UA)"},
  {id:"c46",item:"21.3",pts:15, desc:"Vistoria p/ processo – Área Construída (por m²)",esp:"m2"},
  {id:"c47",item:"21.4",pts:25, desc:"Vistoria p/ processo – confirmação de dados (por UA)"},
  {id:"c48",item:"22.1",pts:20, desc:"Despacho/ficha – Cadastro Imobiliário Fiscal"},
  {id:"c49",item:"22.2",pts:20, desc:"Desdobro/Englobamento – criação das unidades"},
  {id:"c50",item:"22.3",pts:40, desc:"Desdobro/Englobamento – dados avaliativos"},
  {id:"c51",item:"22.4",pts:40, desc:"Identificação sujeito passivo IPTU"},
  {id:"c52",item:"23.1",pts:1,  desc:"Notificação ISSCC – a cada 50 FMPs lançados",esp:"fmp"},
  {id:"c53",item:"24",  pts:10, desc:"Ficha de Lançamento / sistemas informatizados"},
  {id:"c54",item:"25",  pts:150,desc:"Pesquisa de Valores Imobiliários (por UA)"},
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getComp(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function fmtComp(c){const[y,m]=c.split("-");return MESES[+m-1]+"/"+y;}
function fmtBRL(v){return v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});}

function calcPts(cid,f){
  const c=CAT.find(x=>x.id===cid);if(!c)return 0;
  if(c.esp==="m2"){const d=(parseFloat(f.m2b)||0)-(parseFloat(f.m2a)||0);return d>0?Math.round(d*c.pts):0;}
  if(c.esp==="fmp"){const t=parseFloat(f.ft)||0,v=parseFloat(f.fv)||0;return v?Math.floor((t/v)/50)*c.pts:0;}
  // itens com quantidade
  return c.pts*(parseInt(f.qtd)||1);
}

function calcRes(base,exc){
  const total=base+exc;
  if(total<MINP)return{total,ef:0,exc:0};
  return{total,ef:Math.min(total,MAXP),exc:Math.min(Math.max(total-MAXP,0),MAXE)};
}
function gpfi(ef,vb){return ef*vb*VPCT;}
function toUser(r){return{id:r.id,nome:r.nome,mat:r.mat,email:r.email,cargo:r.cargo,role:r.role,unid:r.unid,vb:parseFloat(r.vb),pw:r.pw,ativo:r.ativo,sup_id:r.sup_id||null};}
function toTrf(r){return{id:r.id,uid:r.user_id,comp:r.comp,cid:r.cat_id,desc:r.descricao,pts:r.pts,qtd:r.qtd,data:r.data,obs:r.obs,status:r.status,m2a:r.m2_atual,m2b:r.m2_nova,ft:r.fmp_tot,fv:r.fmp_val};}

function genId(){return "u_"+Math.random().toString(36).slice(2,8);}

// ── MINI COMPONENTS ───────────────────────────────────────────────────────────
function Bdg({lbl,cor}){return h("span",{className:"badge",style:{background:cor+"25",color:cor}},lbl);}
function KCard({icon,lbl,val,cor,sub}){return h("div",{className:"kcard",style:{borderColor:cor+"40"}},h("div",{style:{fontSize:20,marginBottom:4}},icon),h("div",{style:{fontSize:19,fontWeight:900,color:cor}},val),h("div",{style:{fontSize:11,color:"#4a6580",marginTop:2}},lbl),sub&&h("div",{style:{fontSize:10,color:"#3a5168"}},sub));}
function Notif({n}){return n?h("div",{className:"notif",style:{background:n.t==="ok"?"#064e3b":"#7f1d1d"}},n.m):null;}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[users, setU]=useState([]);
  const[trfs,  setT]=useState([]);
  const[exc,   setE]=useState({});
  const[comps, setC]=useState({});
  const[comp,  setComp]=useState(getComp());
  const[user,  setUser]=useState(null);
  const[tab,   setTab]=useState("dash");
  const[lf,    setLF]=useState({email:"",pw:""});
  const[le,    setLE]=useState("");
  const[load,  setLoad]=useState(true);
  const[lmsg,  setLmsg]=useState("Conectando...");
  const[notif, setN]=useState(null);

  const notify=(m,t="ok")=>{setN({m,t});setTimeout(()=>setN(null),3000);};

  useEffect(()=>{
    (async()=>{
      try{
        setLmsg("Carregando usuários...");
        const us=await sb("GET","usuarios","order=nome");
        if(Array.isArray(us))setU(us.map(toUser));
        setLmsg("Carregando tarefas...");
        const ts=await sb("GET","tarefas","order=criado_em.desc");
        if(Array.isArray(ts))setT(ts.map(toTrf));
        setLmsg("Carregando configurações...");
        const[exs,cfg,cps]=await Promise.all([sb("GET","excedentes"),sb("GET","config","chave=eq.comp_ativa"),sb("GET","competencias")]);
        if(Array.isArray(exs)){const em={};exs.forEach(e=>{em[e.user_id+"_"+e.comp]=e.valor;});setE(em);}
        if(Array.isArray(cfg)&&cfg.length)setComp(cfg[0].valor);
        if(Array.isArray(cps)){const cm={};cps.forEach(c=>{if(!cm[c.comp])cm[c.comp]={};cm[c.comp][c.user_id]={ef:c.efetivos,exc:c.excedente,total:c.total};});setC(cm);}
      }catch(e){alert("Erro ao conectar: "+e.message);}
      setLoad(false);
    })();
  },[]);

  const getBase=useCallback((uid,c)=>trfs.filter(t=>t.uid===uid&&t.comp===c&&t.status==="ap_ger").reduce((s,t)=>s+t.pts,0),[trfs]);
  const getExc =useCallback((uid,c)=>exc[uid+"_"+c]||0,[exc]);
  const getR   =useCallback((uid,c)=>calcRes(getBase(uid,c),getExc(uid,c)),[getBase,getExc]);
  const cols   =useCallback(()=>users.filter(u=>u.role==="colaborador"&&u.ativo),[users]);

  // #5 — média apenas dos aptos
  const mediaAptos=useCallback((c)=>{
    const aptos=cols().filter(u=>getR(u.id,c).ef>=MINP);
    if(!aptos.length)return 0;
    return Math.round(aptos.reduce((s,u)=>s+getR(u.id,c).ef,0)/aptos.length);
  },[cols,getR]);

  const myCols=useCallback(()=>{
    if(!user)return[];
    if(user.role==="admin"||user.role==="diretor")return cols();
    if(user.role==="gerente"||user.role==="encarregado")return users.filter(u=>u.role==="colaborador"&&u.unid===user.unid&&u.ativo);
    return[];
  },[user,users,cols]);

  const pends=useCallback(()=>{
    if(!user)return[];
    if(user.role==="encarregado"){
      return trfs.filter(t=>{
        const u=users.find(x=>x.id===t.uid);
        return u&&u.unid===user.unid&&t.status==="pend"&&u.sup_id===user.id;
      });
    }
    if(user.role==="gerente"){
      return trfs.filter(t=>{
        const u=users.find(x=>x.id===t.uid);
        if(!u||u.unid!==user.unid)return false;
        // sem encarregado: gerente valida direto (pend → ap_ger)
        const temEnc=users.some(x=>x.role==="encarregado"&&x.id===u.sup_id);
        if(!temEnc&&t.status==="pend")return true;
        // com encarregado: gerente valida após enc aprovar
        return t.status==="ap_enc";
      });
    }
    return[];
  },[user,trfs,users]);

  function doLogin(){
    const u=users.find(x=>x.email.toLowerCase()===lf.email.toLowerCase());
    if(!u){setLE("Usuário não encontrado.");return;}
    if(lf.pw!==u.pw){setLE("Senha incorreta.");return;}
    setUser(u);setLE("");setTab("dash");
  }

  if(load)return h("div",{className:"load-screen"},h("div",{className:"spinner",style:{width:48,height:48}}),h("span",{style:{color:"#4a6580",fontSize:14}},lmsg),h("span",{style:{color:"#3a5168",fontSize:11}},"Aguarde..."));

  // #7 — tela de login sem senha padrão
  if(!user)return h("div",{className:"login-screen"},
    h("div",{style:{width:"100%",maxWidth:420,textAlign:"center"}},
      h("div",{style:{marginBottom:20}},h("div",{style:{fontSize:44}},"🏛️"),h("div",{style:{fontSize:22,fontWeight:900,color:"#7eb8f7",letterSpacing:2}},"GPFI"),h("div",{style:{fontSize:11,color:"#4a6580",marginTop:4}},"Prefeitura de Santo André — Gratificação de Desempenho")),
      h("div",{style:{background:"#162234",borderRadius:14,padding:24,border:"1px solid #243448"}},
        h("div",{className:"field"},h("label",{className:"lbl"},"USUÁRIO"),h("select",{value:lf.email,onChange:e=>setLF(f=>({...f,email:e.target.value}))},h("option",{value:""},"Selecione..."),users.map(u=>h("option",{key:u.id,value:u.email},u.nome+" — "+u.cargo)))),
        h("div",{className:"field"},h("label",{className:"lbl"},"SENHA"),h("input",{type:"password",placeholder:"Senha",value:lf.pw,onChange:e=>setLF(f=>({...f,pw:e.target.value})),onKeyDown:e=>e.key==="Enter"&&doLogin()})),
        le&&h("div",{style:{color:"#f87171",fontSize:12,marginBottom:10}},le),
        h("button",{className:"btn",style:{width:"100%",padding:11},onClick:doLogin},"Entrar")
      )
    )
  );

  const np=pends().length;
  const isAdmin=user.role==="admin"||user.role==="diretor"; // #2
  const NAV=[

// ── COMPETÊNCIA ───────────────────────────────────────────────────────────────
function Comp({comp,setComp,users,comps,setC,exc,setE,getR,notify}){
  const[confirm,setConfirm]=useState(false);
  const[sav,setSav]=useState(false);
  function nextComp(c){const[y,m]=c.split("-").map(Number);const d=new Date(y,m,1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
  async function encerrar(){
    setSav(true);
    try{
      const nc=nextComp(comp);
      const rows=users.map(u=>{const r=getR(u.id,comp);return{comp,user_id:u.id,efetivos:r.ef,excedente:r.exc,total:r.total};});
      await sb("POST","competencias","",rows);
      const excRows=users.filter(u=>getR(u.id,comp).exc>0).map(u=>{const r=getR(u.id,comp);return{user_id:u.id,comp:nc,valor:r.exc};});
      if(excRows.length)await sb("POST","excedentes","on_conflict=user_id,comp",excRows);
      await sb("PATCH","config","chave=eq.comp_ativa",{valor:nc});
      const ne={...exc};users.forEach(u=>{const r=getR(u.id,comp);if(r.exc>0)ne[u.id+"_"+nc]=r.exc;});setE(ne);
      const snap={};users.forEach(u=>{snap[u.id]=getR(u.id,comp);});setC(p=>({...p,[comp]:snap}));
      setComp(nc);setConfirm(false);notify("Competência "+fmtComp(comp)+" encerrada!");
    }catch(e){notify("Erro: "+e.message,"err");}
    setSav(false);
  }
  const hist=Object.keys(comps).sort().reverse();
  return h("div",null,h("h2",{className:"ph"},"Gestão de Competência"),
    h("div",{className:"card",style:{padding:18,marginBottom:14}},
      h("div",{style:{fontWeight:700,fontSize:15,marginBottom:8}},"Ativa: ",h("span",{style:{color:"#3b82f6"}},fmtComp(comp))),
      h("p",{style:{color:"#4a6580",fontSize:13,marginBottom:14}},"Encerrar salva snapshot, transfere excedentes e avança o período."),
      !confirm?h("button",{className:"btnd",onClick:()=>setConfirm(true)},"🔒 Encerrar "+fmtComp(comp))
        :h("div",{style:{background:"#1a0000",border:"1px solid #dc2626",borderRadius:8,padding:14}},
          h("p",{style:{color:"#fca5a5",fontWeight:700,marginBottom:10}},"⚠️ Confirma? Ação irreversível."),
          h("div",{className:"btn-row"},h("button",{className:"btnd",onClick:encerrar,disabled:sav},sav?"Processando...":"Confirmar"),h("button",{className:"btns",onClick:()=>setConfirm(false)},"Cancelar"))
        )

    hist.length>0&&h("div",{className:"card"},h("div",{className:"card-head"},"Histórico ("+hist.length+")"),h("div",{className:"tbl-wrap"},h("table",null,
      h("thead",null,h("tr",null,["Competência","Colaboradores","Média","Status"].map(x=>h("th",{key:x},x)))),
      h("tbody",null,hist.map(c=>{const s=comps[c],ids=Object.keys(s);const med=ids.length?Math.round(ids.reduce((a,id)=>a+(s[id]?s[id].ef:0),0)/ids.length):0;return h("tr",{key:c},h("td",{style:{fontWeight:700,color:"#7eb8f7"}},fmtComp(c)),h("td",null,ids.length),h("td",{style:{fontWeight:700,color:"#3b82f6"}},med),h("td",null,h(Bdg,{lbl:"Encerrada",cor:"#10b981"})));})
      )
    )))
  );
}
